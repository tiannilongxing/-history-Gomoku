<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋对战 - 大厅</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="stars"></div>
<!-- 装饰性浮动棋子 -->
<div class="floating-pieces" aria-hidden="true">
  <div class="float-piece float-black float-1"></div>
  <div class="float-piece float-white float-2"></div>
  <div class="float-piece float-black float-3"></div>
  <div class="float-piece float-white float-4"></div>
  <div class="float-piece float-black float-5"></div>
</div>
<!-- 用户信息栏 -->
<div id="userInfoBarWrapper" class="user-info-bar-wrapper hidden">
  <div class="user-info-trigger"></div>
  <div id="userInfoBar" class="user-info" style="width: 80%;">
    <div>
      <strong>欢迎，<span id="userNickname"></span></strong>
      <span>积分: <span id="userScore">0</span></span>
    </div>
    <div class="user-actions">
      <button id="updateNicknameBtn" class="btn">修改昵称</button>
      <button id="updatePasswordBtn" class="btn">修改密码</button>
      <button id="rankBtn" class="btn">排行榜</button>
      <button id="logoutBtn" class="btn btn-danger">退出登录</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- 登录面板 -->
  <div id="loginPanel" class="panel login-panel">
    <div class="login-decor-pieces">
      <span class="decor-piece decor-black decor-sm"></span>
      <span class="decor-piece decor-white decor-sm"></span>
    </div>
    <h2>用户登录</h2>
    <div class="input-group">
      <input type="text" id="usernameInput" placeholder="用户名">
    </div>
    <div class="input-group">
      <input type="password" id="passwordInput" placeholder="密码">
    </div>
    <button id="loginBtn" class="btn">登录</button>
    <button id="showRegisterBtn" class="btn">注册账号</button>
  </div>

  <!-- 注册面板 -->
  <div id="registerPanel" class="panel login-panel hidden">
    <div class="login-decor-pieces">
      <span class="decor-piece decor-white decor-sm"></span>
      <span class="decor-piece decor-black decor-sm"></span>
    </div>
    <h2>用户注册</h2>
    <div class="input-group">
      <input type="text" id="regUsernameInput" placeholder="用户名">
    </div>
    <div class="input-group">
      <input type="password" id="regPasswordInput" placeholder="密码">
    </div>
    <div class="input-group">
      <input type="password" id="regConfirmPasswordInput" placeholder="确认密码">
    </div>
    <div class="input-group">
      <input type="text" id="regNicknameInput" placeholder="昵称（可选）">
    </div>
    <button id="registerBtn" class="btn">注册</button>
    <button id="showLoginBtn" class="btn">返回登录</button>
  </div>

  <!-- 排行榜面板 -->
  <div id="rankPanel" class="panel login-panel hidden" style="max-width: 640px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <div>
        <h2 style="margin: 0;">积分排行榜</h2>
        <div class="rank-accent-line"></div>
      </div>
      <div style="background: linear-gradient(135deg, #3a5ba0 0%, #c8963e 100%); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.9em;">
        排名: <span id="myRank">-</span> | 积分: <span id="myScore">0</span>
      </div>
    </div>
    <div id="rankList" class="room-list" style="max-height: 55vh; overflow-y: auto;">
      <!-- 排行榜内容动态生成 -->
    </div>
    <button id="closeRankBtn" class="btn" style="width: 100%; margin-top: 12px;">返回大厅</button>
  </div>

  <!-- 主大厅面板 -->
  <div id="mainLobbyPanel" class="hidden">
    <!-- 头部装饰区 -->
    <div class="lobby-hero">
      <div class="lobby-hero-decor">
        <span class="decor-piece decor-black"></span>
        <span class="decor-line"></span>
        <span class="decor-piece decor-white"></span>
        <span class="decor-line"></span>
        <span class="decor-piece decor-black decor-sm"></span>
      </div>
      <h1 class="lobby-title">五子棋对战大厅</h1>
      <p class="lobby-subtitle">落子无悔，弈出风华</p>
    </div>

    <!-- 双栏布局 -->
    <div class="lobby-grid">
      <!-- 左栏：房间管理 -->
      <div class="panel lobby-left">
        <h2 class="section-title">房间管理</h2>
        <div class="action-buttons">
          <button id="createRoomBtn" class="btn btn-large">创建房间</button>
          <div class="join-section">
            <input type="text" id="roomIdInput" placeholder="输入6位房间号" maxlength="6">
            <button id="joinRoomBtn" class="btn">加入房间</button>
          </div>
        </div>
      </div>

      <!-- 右栏：房间列表 -->
      <div class="panel lobby-right">
        <div class="section-title-row">
          <h2 class="section-title">房间列表</h2>
          <button id="refreshRoomsBtn" class="btn btn-sm">刷新列表</button>
        </div>
        <div id="roomList" class="room-list">
          <!-- 房间列表动态生成 -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 修改昵称模态框 -->
<div id="updateNicknameModal" class="modal hidden">
  <div class="modal-content">
    <h2>修改昵称</h2>
    <div class="input-group">
      <input type="text" id="newNicknameInput" placeholder="新昵称">
    </div>
    <div class="modal-actions">
      <button id="confirmUpdateNicknameBtn" class="btn">确认修改</button>
      <button id="cancelUpdateNicknameBtn" class="btn btn-danger">取消</button>
    </div>
  </div>
</div>

<!-- 修改密码模态框 -->
<div id="updatePasswordModal" class="modal hidden">
  <div class="modal-content">
    <h2>修改密码</h2>
    <div class="input-group">
      <input type="password" id="oldPasswordInput" placeholder="原密码">
    </div>
    <div class="input-group">
      <input type="password" id="newPasswordInput" placeholder="新密码">
    </div>
    <div class="input-group">
      <input type="password" id="confirmNewPasswordInput" placeholder="确认新密码">
    </div>
    <div class="modal-actions">
      <button id="confirmUpdatePasswordBtn" class="btn">确认修改</button>
      <button id="cancelUpdatePasswordBtn" class="btn btn-danger">取消</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
