<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋对战平台</title>
    <link rel="stylesheet" href="css/portal.css">
</head>
<body>

<!-- 背景 -->
<div class="portal-bg"></div>

<!-- 浮动棋子 -->
<div class="float-chess float-chess--black"></div>
<div class="float-chess float-chess--white"></div>
<div class="float-chess float-chess--black"></div>
<div class="float-chess float-chess--white"></div>
<div class="float-chess float-chess--black"></div>
<div class="float-chess float-chess--white"></div>

<div class="portal-content">
    <!-- Logo -->
    <div class="portal-logo">
        <svg viewBox="0 0 56 56" width="72" height="72" fill="none">
            <rect x="4" y="4" width="48" height="48" rx="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
            <line x1="14" y1="4" x2="14" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="24" y1="4" x2="24" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="34" y1="4" x2="34" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="44" y1="4" x2="44" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="4" y1="14" x2="52" y2="14" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="4" y1="24" x2="52" y2="24" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="4" y1="34" x2="52" y2="34" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <line x1="4" y1="44" x2="52" y2="44" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>
            <circle cx="24" cy="24" r="7" fill="url(#pBk)"/>
            <circle cx="34" cy="34" r="7" fill="#f0ece4" stroke="#c8c0b0" stroke-width="0.8"/>
            <circle cx="14" cy="44" r="6" fill="url(#pBk2)"/>
            <circle cx="44" cy="14" r="6" fill="#f0ece4" stroke="#c8c0b0" stroke-width="0.8"/>
            <circle cx="34" cy="14" r="5.5" fill="url(#pBk3)"/>
            <defs>
                <radialGradient id="pBk" cx="35%" cy="30%"><stop offset="0%" stop-color="#666"/><stop offset="100%" stop-color="#111"/></radialGradient>
                <radialGradient id="pBk2" cx="35%" cy="30%"><stop offset="0%" stop-color="#666"/><stop offset="100%" stop-color="#111"/></radialGradient>
                <radialGradient id="pBk3" cx="35%" cy="30%"><stop offset="0%" stop-color="#666"/><stop offset="100%" stop-color="#111"/></radialGradient>
            </defs>
        </svg>
    </div>

    <h1 class="portal-title">五子棋对战平台</h1>
    <p class="portal-subtitle">落子无悔 &nbsp; 弈出风华</p>

    <!-- 入口卡片 -->
    <div class="portal-cards">
        <!-- 选手入口 -->
        <a class="portal-card portal-card--player" href="lobby.html">
            <div class="portal-card__icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="5"/>
                    <path d="M3 21v-2a7 7 0 0 1 7-7h4a7 7 0 0 1 7 7v2"/>
                </svg>
            </div>
            <div class="portal-card__title">选手入口</div>
            <div class="portal-card__desc">登录账号，创建或加入房间<br>与对手实时对弈、观战聊天</div>
            <div class="portal-card__arrow">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>
        </a>

        <!-- 管理员入口 -->
        <a class="portal-card portal-card--admin" href="admin.html">
            <div class="portal-card__icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="portal-card__title">管理员入口</div>
            <div class="portal-card__desc">后台管理中心<br>用户管理、数据统计与系统运维</div>
            <div class="portal-card__arrow">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>
        </a>
    </div>

    <div class="portal-footer">五子棋对战平台 v2.0</div>
</div>

</body>
</html>
