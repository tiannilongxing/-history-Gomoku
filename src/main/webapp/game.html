<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋对战 - 游戏房间</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="stars"></div>
<!-- 装饰性浮动棋子 -->
<div class="floating-pieces" aria-hidden="true">
  <div class="float-piece float-black float-1"></div>
  <div class="float-piece float-white float-2"></div>
  <div class="float-piece float-black float-3"></div>
  <div class="float-piece float-white float-4"></div>
  <div class="float-piece float-black float-5"></div>
</div>
<div class="container game-container">
  <div class="game-header">
    <div>
      <h1>五子棋对战</h1>
      <div class="header-accent-line"></div>
    </div>
    <div class="room-info">
      房间号: <span id="currentRoomId">加载中...</span>
      <button id="leaveRoomBtn" class="btn btn-danger">离开房间</button>
    </div>
  </div>

  <div class="game-layout">
    <!-- 左侧：玩家信息 -->
    <div class="panel left-panel">
      <div class="player-info" id="blackPlayer">
        <h3>黑棋(玩家一)</h3>
        <div class="player-details">
          <div id="blackPlayerName" class="player-name">等待玩家...</div>
          <div class="player-status" id="blackPlayerStatus"></div>
        </div>
      </div>

      <div class="panel-decor-line"></div>

      <div class="game-status">
        <div id="gameStatus" class="status-message">状态: 等待中</div>
        <div id="turnInfo" class="turn-info">当前回合: 等待中</div>
      </div>

      <div class="panel-decor-line"></div>

      <div class="player-info" id="whitePlayer">
        <h3>白棋(玩家二)</h3>
        <div class="player-details">
          <div id="whitePlayerName" class="player-name">等待玩家...</div>
          <div class="player-status" id="whitePlayerStatus"></div>
        </div>
      </div>

      <div class="my-role">
        <div class="status-message">我的角色: <span id="playerRole">加载中...</span></div>
      </div>

      <div class="spectator-info">
        观战者: <span id="spectatorCount">0</span>人
      </div>
    </div>

    <!-- 中间：游戏棋盘 -->
    <div class="panel center-panel">
      <div id="waitingMessage" class="waiting-message">
        <h3>等待另一位玩家加入...</h3>
        <p>房间已创建，正在等待其他玩家加入</p>
      </div>

      <div class="game-board-container">
        <div class="game-board" id="board">
          <!-- 棋盘动态生成 -->
        </div>
      </div>

      <!-- 胜利遮罩层 -->
      <div id="victoryOverlay" class="victory-overlay hidden">
        <div class="victory-content">
          <div class="victory-text">游戏结束</div>
          <div class="winner-name" id="winnerName"></div>
          <div class="victory-actions">
            <button id="closeVictoryBtn" class="btn btn-success">返回大厅</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧：聊天区域 -->
    <div class="panel right-panel">
      <h3 class="chat-title"><span class="chat-title-decor">&#9679;</span> 游戏聊天</h3>
      <div id="chatBox" class="chat-box">
        <div class="message system-message">欢迎来到五子棋对战游戏！</div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="输入消息...">
        <button id="sendMessageBtn" class="btn">发送</button>
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/game.js"></script>
</body>
</html>
